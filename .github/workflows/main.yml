name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Criar Base Atari
        run: |
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          # Ajusta a versão mínima do Android para o player de música funcionar
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          
      - name: Configurar Ícone
        run: |
          if [ -f "app_icon.png" ]; then
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            cp app_icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi

      - name: Configurar Receita
        run: |
          echo "name: sound_bit
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.36
            on_audio_query: ^2.5.0
            permission_handler: ^11.0.0
          flutter:
            uses-material-design: true" > pubspec.yaml

      - name: Injetar Código Atari Retro
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:on_audio_query/on_audio_query.dart';

          void main() => runApp(MaterialApp(
            home: SoundBit(),
            debugShowCheckedModeBanner: false,
            theme: ThemeData(fontFamily: 'Courier'), // Estilo Máquina de Escrever
          ));

          class SoundBit extends StatelessWidget {
            final OnAudioQuery _audioQuery = OnAudioQuery();
            final AudioPlayer _player = AudioPlayer();

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Color(0xFFFAF0E6), // Off-white
                appBar: AppBar(
                  elevation: 0,
                  backgroundColor: Colors.transparent,
                  title: Text("SOUND BIT", style: TextStyle(color: Color(0xFF013220), fontWeight: FontWeight.bold)),
                  bottom: PreferredSize(
                    preferredSize: Size.fromHeight(4),
                    child: Container(
                      height: 4,
                      decoration: BoxDecoration(
                        gradient: LinearGradient(colors: [Colors.red, Colors.orange, Colors.yellow, Colors.green, Colors.blue, Colors.purple]),
                      ),
                    ),
                  ),
                ),
                body: FutureBuilder<List<SongModel>>(
                  future: _audioQuery.querySongs(uriType: UriType.EXTERNAL),
                  builder: (context, item) {
                    if (!item.hasData) return Center(child: CircularProgressIndicator(color: Color(0xFF013220)));
                    return ListView.builder(
                      itemCount: item.data!.length,
                      itemBuilder: (context, index) => ListTile(
                        leading: Icon(Icons.keyboard_arrow_right, color: Color(0xFF013220)),
                        title: Text(item.data![index].title.toUpperCase(), style: TextStyle(color: Color(0xFF013220), fontSize: 14)),
                        onTap: () async {
                          await _player.setAudioSource(AudioSource.uri(Uri.parse(item.data![index].uri!)));
                          _player.play();
                        },
                      ),
                    );
                  },
                ),
              );
            }
          }
          EOF

      - name: Gerar APK Final
        run: flutter build apk --debug

      - name: Feliz APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
