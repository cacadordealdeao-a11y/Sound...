name: Build SOUND BIT Final
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Criar Projeto e Injetar Arquivos
        run: |
          # 1. Cria o projeto básico
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          
          # 2. RESOLUÇÃO DO ERRO: Criamos o arquivo de configuração manualmente
          # Isso garante que o arquivo EXISTA e tenha a versão correta
          mkdir -p android/app
          echo "android.namespace=com.soundbit.sound_bit" > android/gradle.properties
          
          # Criamos um build.gradle novo e limpo para evitar o erro do 'sed'
          cat << 'EOF' > android/app/build.gradle
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
          }
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.soundbit.sound_bit"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.soundbit.sound_bit"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          flutter { source '../..' }
          EOF

      - name: Injetar Dependências e Código
        run: |
          echo "name: sound_bit
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter: { sdk: flutter }
            just_audio: ^0.9.36
            on_audio_query: ^2.5.0
          flutter: { uses-material-design: true }" > pubspec.yaml

          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              backgroundColor: const Color(0xFFFAF0E6),
              appBar: AppBar(
                backgroundColor: Colors.transparent,
                elevation: 0,
                title: const Text("SOUND BIT", style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif', fontWeight: FontWeight.bold)),
              ),
              body: const Center(child: Text("SISTEMA PRONTO", style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif'))),
            ),
          ));
          EOF

      - name: Gerar APK
        run: flutter build apk --debug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
