name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Android Project
        run: |
          flutter create --platforms android --org com.soundbit .
          # Comando para corrigir o erro de Namespace diretamente no ficheiro build.gradle
          sed -i 's/namespace = .*/namespace = "com.soundbit.sound_bit"/' android/app/build.gradle || echo "namespace \"com.soundbit.sound_bit\"" >> android/app/build.gradle

      - name: Build APK
        run: flutter build apk --debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
