name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Setup e Correcoes
        run: |
          # 1. Cria o projeto do zero para garantir que as pastas existam
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          
          # 2. RESOLVE O ERRO DE DIRETÓRIO: Só roda o sed após o create
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle
          echo "android.namespace=com.soundbit.sound_bit" >> android/gradle.properties

      - name: Configurar Arquivos
        run: |
          # Configura o ícone se ele existir
          if [ -f "app_icon.png" ]; then
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            cp app_icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          fi
          
          # Configura as dependências de música
          echo "name: sound_bit
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.36
            on_audio_query: ^2.5.0
            permission_handler: ^11.0.0
          flutter:
            uses-material-design: true" > pubspec.yaml

      - name: Codigo Visual Retro
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:just_audio/just_audio.dart';
          import 'package:on_audio_query/on_audio_query.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            theme: ThemeData(fontFamily: 'monospace'),
            home: Scaffold(
              backgroundColor: const Color(0xFFFAF0E6),
              appBar: AppBar(
                elevation: 0,
                backgroundColor: Colors.transparent,
                title: const Text("SOUND BIT", style: TextStyle(color: Color(0xFF013220), fontWeight: FontWeight.bold)),
                bottom: PreferredSize(
                  preferredSize: const Size.fromHeight(6),
                  child: Row(
                    children: [
                      Expanded(child: Container(height: 6, color: Colors.red)),
                      Expanded(child: Container(height: 6, color: Colors.orange)),
                      Expanded(child: Container(height: 6, color: Colors.yellow)),
                      Expanded(child: Container(height: 6, color: Colors.green)),
                      Expanded(child: Container(height: 6, color: Colors.blue)),
                      Expanded(child: Container(height: 6, color: Colors.purple)),
                    ],
                  ),
                ),
              ),
              body: const Center(child: Text("AGUARDANDO MUSICAS...", style: TextStyle(color: Color(0xFF013220)))),
            ),
          ));
          EOF

      - name: Criar APK
        run: flutter build apk --debug

      - name: Download do APK
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
