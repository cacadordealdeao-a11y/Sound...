name: Build SOUND BIT Final
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Construção da Estrutura
        run: |
          # 1. Cria o projeto e limpa arquivos fantasmas
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          rm -rf android/app/build.gradle
          
          # 2. Injeta o Namespace e configurações de erro do Gradle
          echo "android.namespace=com.soundbit.sound_bit" > android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # 3. Escreve o build.gradle do zero (Mata o erro de 'No such file')
          cat << 'EOF' > android/app/build.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.soundbit.sound_bit"
              compileSdkVersion 34
              defaultConfig {
                  applicationId "com.soundbit.sound_bit"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: App Completo (Creme e Verde)
        run: |
          # Configura dependências de áudio
          echo "name: sound_bit
          environment: { sdk: '>=3.0.0 <4.0.0' }
          dependencies:
            flutter: { sdk: flutter }
            just_audio: ^0.9.36
            on_audio_query: ^2.5.0
          flutter: { uses-material-design: true }" > pubspec.yaml

          # Código visual limpo sem arco-íris
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              backgroundColor: const Color(0xFFFAF0E6),
              appBar: AppBar(
                backgroundColor: Colors.transparent,
                elevation: 0,
                title: const Text("SOUND BIT", style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif', fontWeight: FontWeight.bold)),
              ),
              body: const Center(child: Text("SISTEMA PRONTO", style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif'))),
            ),
          ));
          EOF

      - name: Gerar APK
        run: flutter build apk --debug

      - name: Download
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
