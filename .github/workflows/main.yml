name: Build Android APK
on:
  push:
    branches: [ master, main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Project Structure
        run: |
          # Este comando cria as pastas que o erro reclama
          flutter create --platforms android --org com.soundbit .
          # Define o nome interno do app para o Android
          echo "android.namespace=com.soundbit.sound_bit" >> android/gradle.properties

      - name: Build APK
        run: flutter build apk --debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
