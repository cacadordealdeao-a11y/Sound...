name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Criar Projeto e Corrigir Erros
        run: |
          # 1. Cria o projeto com nome válido (resolve o erro)
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          
          # 2. Aguarda 2 segundos para garantir que o sistema de arquivos registrou as pastas
          sleep 2
          
          # 3. Configura o Namespace e Versão (resolve o erro)
          echo "android.namespace=com.soundbit.sound_bit" >> android/gradle.properties
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

      - name: Gerar Arquivos do App
        run: |
          # Configura as dependências de música
          echo "name: sound_bit
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            just_audio: ^0.9.36
            on_audio_query: ^2.5.0
            permission_handler: ^11.0.0
          flutter:
            uses-material-design: true" > pubspec.yaml

          # Cria a pasta lib e o código visual
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              backgroundColor: const Color(0xFFFAF0E6),
              appBar: AppBar(
                backgroundColor: Colors.transparent,
                elevation: 0,
                title: const Text("SOUND BIT", style: TextStyle(color: Color(0xFF013220), fontFamily: 'monospace')),
                bottom: PreferredSize(
                  preferredSize: const Size.fromHeight(5),
                  child: Row(
                    children: [
                      Expanded(child: Container(height: 5, color: Colors.red)),
                      Expanded(child: Container(height: 5, color: Colors.orange)),
                      Expanded(child: Container(height: 5, color: Colors.yellow)),
                      Expanded(child: Container(height: 5, color: Colors.green)),
                      Expanded(child: Container(height: 5, color: Colors.blue)),
                      Expanded(child: Container(height: 5, color: Colors.purple)),
                    ],
                  ),
                ),
              ),
              body: const Center(child: Text("SISTEMA OPERACIONAL ATIVO", style: TextStyle(color: Color(0xFF013220), fontFamily: 'monospace'))),
            ),
          ));
          EOF

      - name: Compilar APK
        run: flutter build apk --debug

      - name: Disponibilizar Download
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
