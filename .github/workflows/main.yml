name: Build Android APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Criar Projeto do Zero
        run: |
          # Este comando força a criação de TODOS os ficheiros que faltam
          flutter create --platforms android --org com.soundbit .
          
      - name: Substituir Código
        run: |
          # Isto garante que o seu código vai para o lugar certo
          mkdir -p lib
          echo 'import "package:flutter/material.dart"; void main() => runApp(MaterialApp(home: Scaffold(body: Center(child: Text("SOUND BIT FUNCIONOU!")))));' > lib/main.dart

      - name: Gerar APK
        run: flutter build apk --debug

      - name: Enviar Ficheiro
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
