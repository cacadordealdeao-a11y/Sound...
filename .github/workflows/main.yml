name: Build SOUND BIT Final
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Direto
        run: |
          # 1. Cria o projeto (Resolve o erro de nome)
          flutter create --platforms android --org com.soundbit --project-name sound_bit .
          
          # 2. Configura o Namespace na marra para evitar erro de Gradle
          echo "android.namespace=com.soundbit.sound_bit" > android/gradle.properties
          
          # 3. Define as dependências básicas
          echo "name: sound_bit
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
          flutter:
            uses-material-design: true" > pubspec.yaml

      - name: Injetar Visual Clean (Sem Erros)
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';

          void main() => runApp(MaterialApp(
            debugShowCheckedModeBanner: false,
            home: Scaffold(
              backgroundColor: const Color(0xFFFAF0E6),
              appBar: AppBar(
                elevation: 0,
                backgroundColor: Colors.transparent,
                title: const Text("SOUND BIT", 
                  style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif', fontWeight: FontWeight.bold)
                ),
              ),
              body: const Center(
                child: Text("SISTEMA OPERACIONAL ATIVO", 
                  style: TextStyle(color: Color(0xFF013220), fontFamily: 'serif')
                ),
              ),
            ),
          ));
          EOF

      - name: Compilar APK (Modo Blindado)
        run: flutter build apk --debug

      - name: Baixe o APK aqui
        uses: actions/upload-artifact@v4
        with:
          name: sound-bit-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          
